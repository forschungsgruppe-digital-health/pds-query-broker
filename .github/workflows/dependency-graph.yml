name: Dependency Graph (Gradle)

# Submits the FULL resolved Gradle dependency graph (incl. transitive deps) to GitHub so
# Dependabot security alerts cover transitive dependencies and an SBOM can be exported.
# Native Dependabot Gradle scanning sees mostly direct deps — this closes that gap.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
