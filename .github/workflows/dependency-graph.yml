name: Dependency Graph (Gradle)

# Submits the FULL resolved Gradle dependency graph (incl. transitive deps) to GitHub so
# Dependabot security alerts cover transitive dependencies and an SBOM can be exported.
# Native Dependabot Gradle scanning sees mostly direct deps — this closes that gap.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
