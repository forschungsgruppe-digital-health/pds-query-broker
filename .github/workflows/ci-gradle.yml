name: Build & Test (Gradle)

on:
  push:
    branches: [main]
    paths:
      - 'broker/**'
      - 'connector-sdk/**'
      - 'connectors/**'
      - 'conformance/**'
      - 'catalog/**'
      - 'gradle/**'
      - 'gradlew'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'version.txt'
      - '.github/workflows/ci-gradle.yml'
  pull_request:
    branches: [main]
    paths:
      - 'broker/**'
      - 'connector-sdk/**'
      - 'connectors/**'
      - 'conformance/**'
      - 'catalog/**'
      - 'gradle/**'
      - 'gradlew'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'version.txt'
      - '.github/workflows/ci-gradle.yml'

permissions:
  contents: read

jobs:
  build:
    name: Gradle build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test (unit + Testcontainers integration)
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
