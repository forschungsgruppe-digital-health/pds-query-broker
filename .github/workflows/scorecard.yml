name: OpenSSF Scorecard

# Supply-chain hygiene score (pinned deps, branch protection, token permissions, dangerous
# workflow patterns, etc.). Informational — uploads SARIF to code scanning and publishes a
# public score; use it to drive improvements, not as a hard gate.

on:
  branch_protection_rule:
  schedule:
    - cron: "27 5 * * 1" # weekly, Monday 05:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write # for publish_results
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          sarif_file: scorecard.sarif
          category: scorecard
