services:

  # ── Message Broker ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: qb-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-broker}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-broker}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FHIR catalog server ─────────────────────────────────────────────────────
  catalog-server:
    image: hapiproject/hapi:v7.4.0
    container_name: qb-catalog
    ports:
      - "8090:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.reuse_cached_search_results_millis: "60000"
    volumes:
      - catalog-data:/data/hapi
    # No container healthcheck: the HAPI starter image is distroless (no shell
    # to exec a probe). Readiness is gated by catalog-seed, which polls
    # /fhir/metadata over the network before seeding.
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Catalog seed: loads OperationDefinitions, MessageDefinitions, etc. ──────
  catalog-seed:
    image: curlimages/curl:8.7.1
    container_name: qb-catalog-seed
    volumes:
      - ../catalog:/catalog:ro
      - ./catalog-seed/seed.sh:/seed.sh:ro
    entrypoint: ["/bin/sh", "/seed.sh"]
    environment:
      CATALOG_URL: http://catalog-server:8080/fhir
    depends_on:
      catalog-server:
        condition: service_started

  # ── AsyncAPI Studio (documentation + spec viewer) ──────────────────────────
  asyncapi-studio:
    image: asyncapi/studio:latest
    container_name: qb-asyncapi-studio
    ports:
      - "8070:80"
    volumes:
      - ../specs:/app/specs:ro

  # ── Query Broker service ────────────────────────────────────────────────────
  broker:
    build:
      context: ..
      dockerfile: docker/broker/Dockerfile
    container_name: qb-broker
    ports:
      - "8080:8080"     # BFF API
      - "8081:8081"     # Management / Actuator
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-broker}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-broker}
      BROKER_CATALOG_URL: http://catalog-server:8080/fhir
      BROKER_AGGREGATOR_TIMEOUT_MS: 8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      catalog-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PDS example connector A (synthetic reference implementation) ────────────
  pds-example:
    build:
      context: ..
      dockerfile: docker/pds-example/Dockerfile
    image: qb-pds-example:local
    container_name: qb-pds-example
    ports:
      - "8082:8082"
      - "8083:8083"     # Management / Actuator
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-broker}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-broker}
      PDS_CONNECTOR_PDS_ID: PDS-EXAMPLE
      PDS_CONNECTOR_GPAS_DOMAIN: https://ths.example.org/gpas/domain/PDS-EXAMPLE
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PDS example connector B (second synthetic site: fan-out demo) ───────────
  pds-example-b:
    image: qb-pds-example:local
    container_name: qb-pds-example-b
    ports:
      - "8084:8082"
      - "8085:8083"     # Management / Actuator
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-broker}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-broker}
      PDS_CONNECTOR_PDS_ID: PDS-EXAMPLE-B
      PDS_CONNECTOR_GPAS_DOMAIN: https://ths.example.org/gpas/domain/PDS-EXAMPLE-B
      # Disjoint synthetic dataset for site B (map keys via JSON to survive env mangling).
      SPRING_APPLICATION_JSON: '{"pds":{"connector":{"pseudonyms":{"PSN-B-0001":"internal-0002"}}}}'
    depends_on:
      rabbitmq:
        condition: service_healthy
      pds-example:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq-data:
  catalog-data:
