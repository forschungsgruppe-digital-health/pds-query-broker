spring:
  application:
    name: query-broker
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    listener:
      simple:
        # Reject unprocessable (poison) messages instead of redelivering forever.
        default-requeue-rejected: false

broker:
  catalog-url: ${BROKER_CATALOG_URL:http://localhost:8090/fhir}
  aggregator-timeout-ms: ${BROKER_AGGREGATOR_TIMEOUT_MS:8000}
  reply-queue: responses.broker

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info
