asyncapi: 3.0.0

info:
  title: Query Broker — PDS Connector Base
  version: 1.0.0
  description: >
    AsyncAPI specification for the AMQP topology of the Query Broker protocol.
    Defines only transport channels and content type.
    The message semantics are described by FHIR resources
    (OperationDefinition, MessageDefinition, GraphDefinition).

servers:
  production:
    host: rabbitmq.example.org:5672
    protocol: amqp
    protocolVersion: 0-9-1
    description: RabbitMQ broker (production)

defaultContentType: application/fhir+json

channels:
  pds.broadcast:
    address: pds.broadcast
    description: >
      Fanout exchange — the broker publishes request Bundles,
      all bound PDS queues receive a copy.
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"

  req.{pdsId}:
    address: req.{pdsId}
    description: >
      PDS-specific request queue, bound to pds.broadcast.
      Each PDS connector consumes from its own queue.
    parameters:
      pdsId:
        description: Unique identifier of the PDS site
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"

  responses.{systemId}:
    address: responses.{systemId}
    description: >
      System-specific response queue. The broker publishes
      aggregated responses to the queue addressed in the request
      via MessageHeader.destination.endpoint.
    parameters:
      systemId:
        description: Identifier of the requesting system (e.g. portal, cdss)
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"

  pds.dlq:
    address: pds.dlq
    description: Dead letter queue for unprocessable messages.
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"

operations:
  publishRequest:
    action: send
    channel:
      $ref: "#/channels/pds.broadcast"
    summary: Broker publishes the request Bundle to the fanout exchange.

  consumeRequest:
    action: receive
    channel:
      $ref: "#/channels/req.{pdsId}"
    summary: PDS connector receives the request Bundle from its queue.

  publishResponse:
    action: send
    channel:
      $ref: "#/channels/responses.{systemId}"
    summary: Broker publishes the aggregated response Bundle to the system-specific queue.

components:
  messages:
    FhirMessageBundle:
      name: FhirMessageBundle
      title: FHIR Message Bundle
      contentType: application/fhir+json
      summary: >
        FHIR R4 Bundle of type "message". The first entry is a MessageHeader
        with eventUri (OperationDefinition URL) and destination (response routing).
        Payload resources are referenced via MessageHeader.focus.
      traits:
        - $ref: "#/components/messageTraits/commonHeaders"

  messageTraits:
    commonHeaders:
      headers:
        type: object
        properties:
          correlationId:
            type: string
            description: MessageHeader.id of the original request (for response correlation).
          replyTo:
            type: string
            description: >
              AMQP replyTo — system-specific response queue.
              Correlates with MessageHeader.destination.endpoint.
