asyncapi: 3.0.0

info:
  title: Query Broker — PDS Connector Base
  version: 1.0.0
  description: >
    AsyncAPI specification for the AMQP topology of the Query Broker protocol.
    Defines only transport channels, bindings, and content type.
    The message semantics are described by FHIR resources
    (OperationDefinition, MessageDefinition, GraphDefinition).
    Correlation is carried in AMQP message properties: correlation-id holds the
    MessageHeader.id of the request, reply-to names the queue a connector must
    publish its response to. Responses additionally carry the correlation in
    FHIR (MessageHeader.response.identifier).

servers:
  production:
    host: rabbitmq.example.org:5672
    protocol: amqp
    protocolVersion: 0-9-1
    description: RabbitMQ broker (production)

defaultContentType: application/fhir+json

channels:
  pds.topic:
    address: 'pds.{pdsId}.request'
    description: >
      Topic exchange — the target routing topology (ADR-006 rev.). The broker
      publishes each request only to the sites it addresses, with routing key
      pds.{pdsId}.request; a connector for {pdsId} binds its request queue with
      that key and therefore receives ONLY requests addressed to it. Unaddressed
      sites receive nothing.
    parameters:
      pdsId:
        description: Unique identifier of the addressed PDS site
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: pds.topic
          type: topic
          durable: true
          autoDelete: false
        bindingVersion: 0.3.0

  pds.broadcast:
    address: pds.broadcast
    description: >
      Fanout exchange — the legacy broadcast topology (ADR-006). The broker
      publishes request Bundles and all bound PDS queues receive a copy;
      connectors self-filter by gPAS domain. Superseded by pds.topic but kept
      for the additive migration (connectors dual-bind); still selectable via
      the broker's routing-mode = fanout.
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: pds.broadcast
          type: fanout
          durable: true
          autoDelete: false
        bindingVersion: 0.3.0

  req.{pdsId}:
    address: req.{pdsId}
    description: >
      PDS-specific request queue. During the fanout→topic migration it is
      DUAL-bound: to pds.broadcast (fanout, legacy) AND to pds.topic with
      binding key pds.{pdsId}.request (topic, target). Each PDS connector
      consumes from its own queue. Declared durable with dead-letter exchange
      pds.dlq (unprocessable messages are rejected without requeue and
      dead-lettered).
    parameters:
      pdsId:
        description: Unique identifier of the PDS site
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"
    bindings:
      amqp:
        is: queue
        queue:
          durable: true
          exclusive: false
          autoDelete: false
        bindingVersion: 0.3.0

  responses.{systemId}:
    address: responses.{systemId}
    description: >
      System-specific durable response queue, addressed via the default
      exchange (routing key = queue name). Two uses of the same pattern:
      (1) the broker publishes aggregated responses to the queue named by the
      request's MessageHeader.destination.endpoint (e.g. responses.portal);
      (2) connectors publish their individual responses to the queue named by
      the AMQP reply-to property of the request (the broker's own reply queue,
      responses.broker).
    parameters:
      systemId:
        description: Identifier of the consuming system (e.g. portal, cdss, broker)
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"
    bindings:
      amqp:
        is: queue
        queue:
          durable: true
          exclusive: false
          autoDelete: false
        bindingVersion: 0.3.0

  pds.dlq:
    address: pds.dlq
    description: Dead letter queue for unprocessable (poison) messages.
    messages:
      fhirMessageBundle:
        $ref: "#/components/messages/FhirMessageBundle"
    bindings:
      amqp:
        is: queue
        queue:
          durable: true
          exclusive: false
          autoDelete: false
        bindingVersion: 0.3.0

operations:
  publishRequest:
    action: send
    channel:
      $ref: "#/channels/pds.topic"
    summary: Broker publishes a per-site request Bundle to each addressed site (topic exchange).
    description: >
      Target routing (ADR-006 rev.): the broker publishes the request once per
      addressed site to pds.topic with routing key pds.{pdsId}.request. Each
      site's Bundle is trimmed to carry ONLY that site's pseudonym(s) (data
      minimization — a site never sees another site's pseudonym); the
      MessageHeader and non-pseudonym operation parameters are unchanged. AMQP
      properties: correlation-id = request MessageHeader.id; reply-to = the
      broker's response queue (responses.broker); delivery mode persistent.
      In legacy fanout mode the same full Bundle (all pseudonyms) is instead
      published once to pds.broadcast and connectors self-filter.
    bindings:
      amqp:
        deliveryMode: 2
        bindingVersion: 0.3.0

  consumeRequest:
    action: receive
    channel:
      $ref: "#/channels/req.{pdsId}"
    summary: PDS connector receives the request Bundle from its queue.
    description: >
      Connectors self-filter by gPAS domain as defense-in-depth: in topic mode
      the broker already trimmed the request to the site's own pseudonym(s), so
      the filter is a no-op; in legacy fanout mode it is what isolates the
      sites. A connector that is not addressed (no pseudonym of its gPAS domain)
      or does not support the requested operation acknowledges silently and
      publishes no response.

  publishConnectorResponse:
    action: send
    channel:
      $ref: "#/channels/responses.{systemId}"
    summary: >
      PDS connector publishes its response Bundle to the queue named by the
      request's AMQP reply-to property, echoing the correlation-id.
    bindings:
      amqp:
        deliveryMode: 2
        bindingVersion: 0.3.0

  publishAggregatedResponse:
    action: send
    channel:
      $ref: "#/channels/responses.{systemId}"
    summary: >
      Broker publishes the aggregated response Bundle to the system-specific
      queue derived from MessageHeader.destination.endpoint, echoing the
      correlation-id.
    bindings:
      amqp:
        deliveryMode: 2
        bindingVersion: 0.3.0

components:
  messages:
    FhirMessageBundle:
      name: FhirMessageBundle
      title: FHIR Message Bundle
      contentType: application/fhir+json
      summary: >
        FHIR R4 Bundle of type "message". The first entry is a MessageHeader
        with eventUri (OperationDefinition URL) and destination (response routing).
        Payload resources are referenced via MessageHeader.focus.
      description: >
        Correlation travels in AMQP message properties (correlation-id,
        reply-to), not in application headers. In response bundles the
        correlation is additionally expressed in FHIR via
        MessageHeader.response.identifier = MessageHeader.id of the request.
